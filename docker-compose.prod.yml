services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashnote}
      POSTGRES_USER: ${POSTGRES_USER:-cashnote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashnote} -d ${POSTGRES_DB:-cashnote}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5173
      DATABASE_URL: postgres://${POSTGRES_USER:-cashnote}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cashnote}
      DATABASE_SSL: "false"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      AD_PROVIDER: ${AD_PROVIDER:-adsense}
      ADSENSE_CLIENT: ${ADSENSE_CLIENT:-}
      ADSENSE_BOTTOM_BANNER_SLOT: ${ADSENSE_BOTTOM_BANNER_SLOT:-}
      ADSENSE_PUBLISHER_ID: ${ADSENSE_PUBLISHER_ID:-}
      AUTH_CODE_SECRET: ${AUTH_CODE_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_HOST: ${CADDY_HOST:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
