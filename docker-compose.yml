services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_board
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_board"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5173
      DATABASE_URL: postgres://finance:finance@postgres:5432/finance_board
      DATABASE_SSL: "false"
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    ports:
      - "5173:5173"

volumes:
  postgres-data:
