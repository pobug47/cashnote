<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashnote</title>
    <style>
      :root {
        color: #07140e;
        background: #f4f6f3;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 320px;
        padding: 24px;
        text-align: center;
      }

      strong {
        font-size: 24px;
      }

      a {
        color: #28724f;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>Cashnote</strong>
      <p>앱을 여는 중입니다.</p>
      <a href="https://cn.grapewillow.com">웹으로 열기</a>
    </main>
  </body>
</html>
